[meta]
name = "Rust"
extensions = ["rs"]

[[rule]]
token = "keyword"
pattern = "as|break|const|continue|crate|else|enum|extern|false|fn|for|if|impl|in|let|loop|match|mod|move|mut|pub|ref|return|self|Self|static|struct|super|trait|true|type|unsafe|use|where|while|async|await|dyn|abstract|become|box|do|final|macro|override|priv|typeof|unsized|virtual|yield|try"
word_boundary = true

[[rule]]
token = "type_name"
pattern = "u8|u16|u32|u64|u128|usize|i8|i16|i32|i64|i128|isize|f32|f64|bool|char|str|String|Vec|Option|Result|Box"
word_boundary = true

[[rule]]
token = "number"
pattern = "[0-9]+(\\.[0-9]+)?"
word_boundary = true

[[rule]]
token = "string"
pattern = "\".*?\""

[[rule]]
token = "comment"
pattern = "//.*"

[[rule]]
token = "comment"
start = "/\\*"
end = "\\*/"

[[rule]]
token = "attribute"
pattern = "#\\[.*?\\]"

[[rule]]
token = "function"
pattern = "[a-zA-Z_][a-zA-Z0-9_]*!\\s*(\\(|\\[|\\{)"
word_boundary = true

[[rule]]
token = "function"
pattern = "[a-zA-Z_][a-zA-Z0-9_]*\\s*(?=\\()"
word_boundary = true
