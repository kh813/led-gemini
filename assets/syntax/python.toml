[meta]
name = "Python"
extensions = ["py"]

[[rule]]
token = "keyword"
pattern = "and|as|assert|async|await|break|class|continue|def|del|elif|else|except|finally|for|from|global|if|import|in|is|lambda|nonlocal|not|or|pass|raise|return|try|while|with|yield"
word_boundary = true

[[rule]]
token = "constant"
pattern = "True|False|None"
word_boundary = true

[[rule]]
token = "string"
pattern = "\".*?\""

[[rule]]
token = "string"
pattern = "'.*?'"

[[rule]]
token = "comment"
pattern = "#.*"

[[rule]]
token = "comment"
start = "\"\"\""
end = "\"\"\""

[[rule]]
token = "function"
pattern = "[a-zA-Z_][a-zA-Z0-9_]*\\s*(?=\\()"
word_boundary = true

[[rule]]
token = "attribute"
pattern = "@[a-zA-Z_][a-zA-Z0-9_]*"
